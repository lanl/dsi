name: CKAN Backend CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: [3.10, 3.11]

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run CKAN demo/test scripts
        run: |
          python examples/ckan/1.ingest.py
          python examples/ckan/2.process.py
          python examples/ckan/3.query.py
          python examples/ckan/4.find.py
          python examples/ckan/5.inspect.py