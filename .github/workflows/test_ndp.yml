name: NDP Backend CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: [3.10, 3.11]

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run NDP demo/test scripts
        run: |
          python examples/ndp/1.query_artifacts.py
          python examples/ndp/2.process.py
          python examples/ndp/3.query.py
          python examples/ndp/4.find.py
          python examples/ndp/5.inspect.py
          python examples/ndp/6.validate.py
          python examples/ndp/7.notebook.py
          python examples/ndp/8.close.py